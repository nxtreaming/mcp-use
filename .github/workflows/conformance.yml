name: MCP Conformance Tests
on:
  workflow_dispatch:
    inputs:
      python_only:
        description: 'Run only Python conformance tests'
        type: boolean
        default: false
      typescript_only:
        description: 'Run only TypeScript conformance tests'
        type: boolean
        default: false
  push:
    branches:
      - main
      - canary
    paths:
      - 'libraries/python/mcp_use/server/**'
      - 'libraries/python/mcp_use/client/**'
      - 'libraries/python/pyproject.toml'
      - 'libraries/typescript/packages/mcp-use/src/server/**'
      - 'libraries/typescript/packages/mcp-use/package.json'
      - 'libraries/python/tests/integration/servers_for_testing/conformance_server.py'
      - 'libraries/python/tests/integration/clients_for_testing/conformance_client.py'
      - 'libraries/typescript/packages/mcp-use/examples/server/features/conformance/**'
      - 'libraries/typescript/packages/mcp-use/examples/client/conformance/**'
      - '.github/workflows/conformance.yml'
  pull_request:
    branches:
      - main
      - canary
    paths:
      - 'libraries/python/mcp_use/server/**'
      - 'libraries/python/mcp_use/client/**'
      - 'libraries/python/pyproject.toml'
      - 'libraries/typescript/packages/mcp-use/src/server/**'
      - 'libraries/typescript/packages/mcp-use/src/client/**'
      - 'libraries/typescript/packages/mcp-use/package.json'
      - 'libraries/python/tests/integration/servers_for_testing/conformance_server.py'
      - 'libraries/python/tests/integration/clients_for_testing/conformance_client.py'
      - 'libraries/typescript/packages/mcp-use/examples/server/features/conformance/**'
      - 'libraries/typescript/packages/mcp-use/examples/client/conformance/**'
      - '.github/workflows/conformance.yml'

permissions:
  contents: read
jobs:
  # Detect which languages had changes so we only run the relevant tests.
  # On workflow_dispatch the manual inputs take precedence instead.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.compute.outputs.python }}
      typescript: ${{ steps.compute.outputs.typescript }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            python:
              - 'libraries/python/**'
              - '.github/workflows/conformance.yml'
            typescript:
              - 'libraries/typescript/**'
              - '.github/workflows/conformance.yml'
      - name: Compute outputs
        id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TYPESCRIPT_ONLY: ${{ github.event.inputs.typescript_only }}
          INPUT_PYTHON_ONLY: ${{ github.event.inputs.python_only }}
          FILTER_PYTHON: ${{ steps.filter.outputs.python }}
          FILTER_TYPESCRIPT: ${{ steps.filter.outputs.typescript }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual dispatch: use the explicit inputs
            if [ "$INPUT_TYPESCRIPT_ONLY" = "true" ]; then
              echo "python=false" >> $GITHUB_OUTPUT
            else
              echo "python=true" >> $GITHUB_OUTPUT
            fi
            if [ "$INPUT_PYTHON_ONLY" = "true" ]; then
              echo "typescript=false" >> $GITHUB_OUTPUT
            else
              echo "typescript=true" >> $GITHUB_OUTPUT
            fi
          else
            # Push / PR: use path detection
            echo "python=$FILTER_PYTHON" >> $GITHUB_OUTPUT
            echo "typescript=$FILTER_TYPESCRIPT" >> $GITHUB_OUTPUT
          fi

  conformance-test:
    name: Run Conformance Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true' || needs.detect-changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: needs.detect-changes.outputs.python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        if: needs.detect-changes.outputs.python == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        if: needs.detect-changes.outputs.typescript == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Prepare Python
        if: needs.detect-changes.outputs.python == 'true'
        working-directory: libraries/python
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Prepare TypeScript server
        if: needs.detect-changes.outputs.typescript == 'true'
        working-directory: libraries/typescript
        run: |
          pnpm install
          pnpm build

      - name: Install TypeScript conformance server dependencies
        if: needs.detect-changes.outputs.typescript == 'true'
        working-directory: libraries/typescript/packages/mcp-use/examples/server/features/conformance
        run: pnpm install

      - name: Install TypeScript conformance client dependencies
        if: needs.detect-changes.outputs.typescript == 'true'
        working-directory: libraries/typescript/packages/mcp-use/examples/client/conformance
        run: pnpm install

      - name: Build server list
        id: build-servers
        env:
          NEEDS_PYTHON: ${{ needs.detect-changes.outputs.python }}
          NEEDS_TYPESCRIPT: ${{ needs.detect-changes.outputs.typescript }}
        run: |
          SERVERS='['
          if [ "$NEEDS_PYTHON" = "true" ]; then
            SERVERS+='{"name":"python","start-command":"source .venv/bin/activate && python tests/integration/servers_for_testing/conformance_server.py --transport streamable-http --port 8000","url":"http://127.0.0.1:8000/mcp","working-directory":"libraries/python"}'
          fi
          if [ "$NEEDS_TYPESCRIPT" = "true" ]; then
            if [[ $SERVERS != '[' ]]; then
              SERVERS+=','
            fi
            SERVERS+='{"name":"typescript","start-command":"PORT=3000 npx tsx src/server.ts","url":"http://localhost:3000/mcp","working-directory":"libraries/typescript/packages/mcp-use/examples/server/features/conformance"}'
          fi
          SERVERS+=']'
          echo "servers=$SERVERS" >> $GITHUB_OUTPUT

      - name: Build client list
        id: build-clients
        env:
          NEEDS_PYTHON: ${{ needs.detect-changes.outputs.python }}
          NEEDS_TYPESCRIPT: ${{ needs.detect-changes.outputs.typescript }}
        run: |
          CLIENTS='['
          if [ "$NEEDS_PYTHON" = "true" ]; then
            CLIENTS+='{"name":"python-client","command":".venv/bin/python tests/integration/clients_for_testing/conformance_client.py","working-directory":"libraries/python"}'
          fi
          if [ "$NEEDS_TYPESCRIPT" = "true" ]; then
            if [[ $CLIENTS != '[' ]]; then
              CLIENTS+=','
            fi
            CLIENTS+='{"name":"typescript-node-client","command":"libraries/typescript/packages/mcp-use/examples/client/conformance/run-conformance-client-node.sh"}'
            CLIENTS+=','
            CLIENTS+='{"name":"typescript-browser-client","command":"libraries/typescript/packages/mcp-use/examples/client/conformance/run-conformance-client-browser.sh"}'
            CLIENTS+=','
            CLIENTS+='{"name":"typescript-react-client","command":"libraries/typescript/packages/mcp-use/examples/client/conformance/run-conformance-client-react.sh"}'
          fi
          CLIENTS+=']'
          echo "clients=$CLIENTS" >> $GITHUB_OUTPUT

      - name: Run conformance tests
        uses: mcp-use/mcp-conformance-action@v1
        env:
          MCP_USE_ANONYMIZED_TELEMETRY: false
        with:
          mode: test
          test-type: both
          servers: ${{ steps.build-servers.outputs.servers }}
          clients: ${{ steps.build-clients.outputs.clients }}
          badge-gist-id: ${{ secrets.CONFORMANCE_GIST_ID }}
          badge-gist-token: ${{ secrets.GIST_SECRET }}
